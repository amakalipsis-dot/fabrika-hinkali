/* --- iOS-like liquid glass (premium, readable) --- */
:root{
  --bg: #efeae5;

  --card-base: rgba(245,240,235,0.80);
  --card-stroke: rgba(255,255,255,0.46);
  --card-shadow: rgba(0,0,0,0.10);

  --btn-base: rgba(232,221,211,0.74);
  --btn-stroke: rgba(255,255,255,0.34);

  --text-strong: #6f6760;
  --text-soft: #8f877f;
}

/* warm ambient background */
body{
  background:
    radial-gradient(900px 600px at 18% 14%, rgba(255,255,255,0.32), rgba(239,234,229,0) 60%),
    radial-gradient(820px 540px at 85% 28%, rgba(255,255,255,0.22), rgba(239,234,229,0) 62%),
    radial-gradient(700px 520px at 55% 92%, rgba(255,255,255,0.16), rgba(239,234,229,0) 70%),
    var(--bg);
}

/* Card: liquid glass with subtle caustics */
.card{
  background:
    linear-gradient(145deg, rgba(255,255,255,0.26), rgba(255,255,255,0.06)),
    var(--card-base);
  backdrop-filter: blur(20px) saturate(1.18);
  -webkit-backdrop-filter: blur(20px) saturate(1.18);
  border: 1px solid var(--card-stroke);
  box-shadow:
    0 18px 46px var(--card-shadow),
    inset 0 1px 0 rgba(255,255,255,0.35),
    0 0 0 1px rgba(226,218,210,0.28);
  position: relative;
  overflow: hidden;
}

/* Top gloss */
.card::before{
  content:"";
  position:absolute;
  inset:-40%;
  background:
    radial-gradient(520px 260px at 22% 6%, rgba(255,255,255,0.22), transparent 62%),
    radial-gradient(520px 260px at 78% 12%, rgba(255,255,255,0.12), transparent 62%);
  pointer-events:none;
  mix-blend-mode: soft-light;
  opacity: .95;
}

/* Subtle "liquid" caustic streaks (very low opacity) */
.card::after{
  content:"";
  position:absolute;
  inset:-30%;
  background:
    linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.08) 25%, transparent 50%, rgba(255,255,255,0.05) 70%, transparent 100%);
  transform: rotate(-8deg);
  pointer-events:none;
  mix-blend-mode: overlay;
  opacity: .18;
}

/* Typography contrast */
h1{ color: var(--text-strong); }
.subtitle, .social-title, .app-title, .download-text{ color: var(--text-soft); }

.btn,
.social-icons a,
.store-btn{
  background:
    linear-gradient(145deg, rgba(255,255,255,0.20), rgba(255,255,255,0.05)),

  backdrop-filter: blur(16px) saturate(1.10);

}

.btn:hover,

/* --- corner pastel gradients (4 corners) --- */
:root{

    radial-gradient(var(--corner-size) at 100% 0%,   var(--corner-2), rgba(0,0,0,0) var(--corner-fade)),
    radial-gradient(var(--corner-size) at 0% 100%,   var(--corner-3), rgba(0,0,0,0) var(--corner-fade)),
    radial-gradient(var(--corner-size) at 100% 100%, var(--corner-4), rgba(0,0,0,0) var(--corner-fade)),
    var(--bg);
}
